# ============================================================
# NutriAI Secrets - TEMPLATE ONLY
# ============================================================
# DO NOT commit real values to source control.
#
# Option A (Recommended for AKS): Use Azure Key Vault + CSI driver.
#   Install: https://learn.microsoft.com/en-us/azure/aks/csi-secrets-store-driver
#   Then replace this file with a SecretProviderClass resource.
#
# Option B (Quick start): Fill in base64-encoded values below.
#   Generate: echo -n "your-value" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: nutriai-secrets
  namespace: nutriai
type: Opaque
data:
  # Database
  DATABASE_URL: <base64-encoded-value>

  # JWT
  SECRET_KEY: <base64-encoded-value>

  # Azure Storage
  AZURE_STORAGE_CONNECTION_STRING: <base64-encoded-value>

  # Azure OpenAI
  AZURE_OPENAI_ENDPOINT: <base64-encoded-value>
  AZURE_OPENAI_KEY: <base64-encoded-value>

  # Azure Document Intelligence
  AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: <base64-encoded-value>
  AZURE_DOCUMENT_INTELLIGENCE_KEY: <base64-encoded-value>

  # Azure Service Bus
  AZURE_SERVICE_BUS_CONNECTION_STRING: <base64-encoded-value>

  # Microsoft Entra ID (SSO)
  ENTRA_CLIENT_ID: <base64-encoded-value>
  ENTRA_CLIENT_SECRET: <base64-encoded-value>
  ENTRA_TENANT_ID: <base64-encoded-value>

  # SMTP credentials
  SMTP_USERNAME: <base64-encoded-value>
  SMTP_PASSWORD: <base64-encoded-value>

  # API Gateway JWT key (same as SECRET_KEY, mirrored for gateway)
  JWT_SECRET_KEY: <base64-encoded-value>
