---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitals-service
  namespace: nutriai
  labels:
    app: vitals-service
    app.kubernetes.io/part-of: nutriai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vitals-service
  template:
    metadata:
      labels:
        app: vitals-service
    spec:
      containers:
        - name: vitals-service
          image: nutriai_acr/vitals-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vitals-service
  namespace: nutriai
spec:
  selector:
    app: vitals-service
  ports:
    - port: 8004
      targetPort: 8004
  type: ClusterIP
