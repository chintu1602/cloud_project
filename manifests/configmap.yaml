apiVersion: v1
kind: ConfigMap
metadata:
  name: nutriai-config
  namespace: nutriai
data:
  # Azure OpenAI
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4"
  AZURE_OPENAI_API_VERSION: "2024-02-01"

  # Azure Storage
  AZURE_STORAGE_CONTAINER_NAME: "nutriai-documents"

  # Azure Service Bus
  AZURE_SERVICE_BUS_TOPIC_NAME: "meal-reminders"
  AZURE_SERVICE_BUS_SUBSCRIPTION_NAME: "email-sender"

  # SMTP (non-sensitive)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM_EMAIL: "noreply@nutriai-health.com"

  # Application
  APP_URL: "https://nutriai.example.com"   # Replace with your domain

  # Internal service URLs (Kubernetes DNS: <service>.<namespace>.svc.cluster.local)
  AUTH_SERVICE_URL:         "http://identity-service:8001"
  DOCUMENT_SERVICE_URL:     "http://ocr-service:8002"
  DIET_SERVICE_URL:         "http://nutrition-service:8003"
  HEALTH_SERVICE_URL:       "http://vitals-service:8004"
  NOTIFICATION_SERVICE_URL: "http://email-service:8005"
  PROFILE_SERVICE_URL:      "http://patient-service:8006"
  ADMIN_SERVICE_URL:        "http://admin-service:8007"

  # Frontend → Gateway proxy target
  BACKEND_URL: "http://gateway:8000"
